<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerere Nouă - Medicina Muncii</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">
    <div class="w-64 bg-blue-700 text-white p-5 fixed h-full">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-blue-700 font-bold text-2xl">MM</div>
            <div>
                <h1 class="font-bold text-xl">Medicina Muncii</h1>
                <p class="text-xs opacity-75">Atlantis</p>
            </div>
        </div>
        <nav class="space-y-2">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-blue-600"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-xl"><i class="fas fa-file-medical"></i> Cereri Noi</a>
        </nav>
    </div>

    <div class="flex-1 ml-64 p-10">
        <h1 class="text-3xl font-bold mb-8">Cerere Nouă Aviz Medical</h1>

        <div class="bg-white rounded-3xl shadow-xl p-10 max-w-4xl">
            <form id="cerereForm">
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="block font-semibold mb-2">Nume & Prenume</label><input type="text" id="nume" class="w-full border rounded-2xl px-5 py-4" required></div>
                    <div><label class="block font-semibold mb-2">Vârsta</label><input type="number" id="varsta" class="w-full border rounded-2xl px-5 py-4" required></div>
                </div>

                <div class="grid grid-cols-2 gap-6 mt-6">
                    <div><label class="block font-semibold mb-2">Firmă</label><input type="text" id="firma" class="w-full border rounded-2xl px-5 py-4" required></div>
                    <div><label class="block font-semibold mb-2">Locație</label><input type="text" id="locatie" class="w-full border rounded-2xl px-5 py-4" required></div>
                </div>

                <div class="mt-6">
                    <label class="block font-semibold mb-2">CNP</label>
                    <input type="text" id="cnp" maxlength="6" class="w-full border rounded-2xl px-5 py-4" required>
                </div>

                <h2 class="text-2xl font-bold mt-10">Formular de Evaluare – Medicina Muncii</h2>

                <div class="space-y-8 mt-8">
                    <div>
                        <label class="block mb-3">I. Suferiți de boli cronice?</label>
                        <div class="flex gap-8">
                            <label><input type="radio" name="boli" value="Nu" checked onchange="toggleField(this, 'boli-spec')"> Nu</label>
                            <label><input type="radio" name="boli" value="Da" onchange="toggleField(this, 'boli-spec')"> Da</label>
                        </div>
                        <textarea id="boli-spec" class="hidden w-full mt-3 border rounded-2xl p-4" placeholder="Specificați..."></textarea>
                    </div>

                    <div>
                        <label class="block mb-3">II. Aveți alergii cunoscute?</label>
                        <div class="flex gap-8">
                            <label><input type="radio" name="alergii" value="Nu" checked onchange="toggleField(this, 'alergii-spec')"> Nu</label>
                            <label><input type="radio" name="alergii" value="Da" onchange="toggleField(this, 'alergii-spec')"> Da</label>
                        </div>
                        <textarea id="alergii-spec" class="hidden w-full mt-3 border rounded-2xl p-4" placeholder="Specificați..."></textarea>
                    </div>

                    <div>
                        <label class="block mb-3">III. Urmați un tratament medical în prezent?</label>
                        <div class="flex gap-8">
                            <label><input type="radio" name="tratament" value="Nu" checked onchange="toggleField(this, 'tratament-spec')"> Nu</label>
                            <label><input type="radio" name="tratament" value="Da" onchange="toggleField(this, 'tratament-spec')"> Da</label>
                        </div>
                        <textarea id="tratament-spec" class="hidden w-full mt-3 border rounded-2xl p-4" placeholder="Descrieți..."></textarea>
                    </div>

                    <div>
                        <label class="block mb-3">IV. Ați avut intervenții chirurgicale sau spitalizări?</label>
                        <div class="flex gap-8">
                            <label><input type="radio" name="interventii" value="Nu" checked onchange="toggleField(this, 'interventii-spec')"> Nu</label>
                            <label><input type="radio" name="interventii" value="Da" onchange="toggleField(this, 'interventii-spec')"> Da</label>
                        </div>
                        <textarea id="interventii-spec" class="hidden w-full mt-3 border rounded-2xl p-4" placeholder="Descrieți intervențiile..."></textarea>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-8 mt-10">
                    <div><label>V. Fumați?</label><div class="flex gap-6 mt-2"><label><input type="radio" name="fumat" value="Nu" checked> Nu</label><label><input type="radio" name="fumat" value="Da"> Da</label></div></div>
                    <div><label>VI. Consumați alcool regulat?</label><div class="flex gap-6 mt-2"><label><input type="radio" name="alcool" value="Nu" checked> Nu</label><label><input type="radio" name="alcool" value="Da"> Da</label></div></div>
                    <div><label>VII. Vă descurcați la lucrul în echipă?</label><div class="flex gap-6 mt-2"><label><input type="radio" name="echipa" value="Nu"> Nu</label><label><input type="radio" name="echipa" value="Da" checked> Da</label></div></div>
                </div>

                <div class="mt-10">
                    <h3 class="font-semibold mb-4">Simptome actuale (În ultimele 6 luni ați avut:)</h3>
                    <table class="w-full border border-gray-300 rounded-2xl">
                        <thead class="bg-gray-50">
                            <tr><th class="p-4 text-left">Simptom</th><th class="p-4 w-24">Da</th><th class="p-4 w-24">Nu</th></tr>
                        </thead>
                        <tbody class="divide-y">
                            <tr><td class="p-4">Dureri de cap frecvente</td><td class="text-center"><input type="radio" name="s1" value="Da"></td><td class="text-center"><input type="radio" name="s1" value="Nu" checked></td></tr>
                            <tr><td class="p-4">Tulburări de vedere</td><td class="text-center"><input type="radio" name="s2" value="Da"></td><td class="text-center"><input type="radio" name="s2" value="Nu" checked></td></tr>
                            <tr><td class="p-4">Dureri de spate / articulații</td><td class="text-center"><input type="radio" name="s3" value="Da"></td><td class="text-center"><input type="radio" name="s3" value="Nu" checked></td></tr>
                            <tr><td class="p-4">Probleme respiratorii</td><td class="text-center"><input type="radio" name="s4" value="Da"></td><td class="text-center"><input type="radio" name="s4" value="Nu" checked></td></tr>
                            <tr><td class="p-4">Probleme de auz</td><td class="text-center"><input type="radio" name="s5" value="Da"></td><td class="text-center"><input type="radio" name="s5" value="Nu" checked></td></tr>
                            <tr><td class="p-4">Amețeli</td><td class="text-center"><input type="radio" name="s6" value="Da"></td><td class="text-center"><input type="radio" name="s6" value="Nu" checked></td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-center mt-12">
                    <button type="button" onclick="trimiteCerere()" class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-5 rounded-2xl text-lg font-semibold">
                        📤 Trimite Cererea
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC2GWF1iu5U2W6kVU9u_4kgawScomCHQA",
        authDomain: "medicina-muncii-27010.firebaseapp.com",
        projectId: "medicina-muncii-27010",
        storageBucket: "medicina-muncii-27010.firebasestorage.app",
        messagingSenderId: "318304709818",
        appId: "1:318304709818:web:c6ae716b7a2f97545eedb8",
        measurementId: "G-F99MNSDMEE"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    if (localStorage.getItem("role") !== "user" && localStorage.getItem("role") !== "admin") {
        alert("Trebuie să te autentifici mai întâi!");
        window.location.href = "login.html";
    }

    function toggleField(radio, fieldId) {
        const field = document.getElementById(fieldId);
        field.classList.toggle("hidden", radio.value !== "Da");
    }

    async function trimiteCerere() {
        const nume = document.getElementById("nume").value.trim();
        const firma = document.getElementById("firma").value.trim();
        const cnp = document.getElementById("cnp").value.trim();

        if (!nume || !firma || !cnp) {
            alert("Completează Numele, Firma și CNP!");
            return;
        }

        const cerere = {
            nume: nume,
            firma: firma,
            locatie: document.getElementById("locatie").value || 'N/A',
            cnp: cnp,
            data: new Date().toLocaleDateString('ro-RO'),
            status: "Nou",
            boli: getRadioValue("boli"),
            boliSpec: document.getElementById("boli-spec").value || '',
            alergii: getRadioValue("alergii"),
            alergiiSpec: document.getElementById("alergii-spec").value || '',
            tratament: getRadioValue("tratament"),
            tratamentSpec: document.getElementById("tratament-spec").value || '',
            interventii: getRadioValue("interventii"),
            interventiiSpec: document.getElementById("interventii-spec").value || '',
            fumat: getRadioValue("fumat"),
            alcool: getRadioValue("alcool"),
            echipa: getRadioValue("echipa"),
            s1: getRadioValue("s1"),
            s2: getRadioValue("s2"),
            s3: getRadioValue("s3"),
            s4: getRadioValue("s4"),
            s5: getRadioValue("s5"),
            s6: getRadioValue("s6"),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("cereri").add(cerere);
            alert(`✅ Cererea pentru ${nume} a fost trimisă!`);
            document.getElementById("cerereForm").reset();
        } catch (error) {
            alert("Eroare la trimitere: " + error.message);
        }
    }

    function getRadioValue(name) {
        const selected = document.querySelector(`input[name="${name}"]:checked`);
        return selected ? selected.value : "Nu";
    }
</script>
</body>
</html>
