<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Medicina Muncii</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

<div class="flex min-h-screen">
    <div class="w-72 bg-gradient-to-b from-blue-800 to-blue-900 text-white p-6 fixed h-full shadow-2xl">
        <div class="flex items-center gap-4 mb-16">
            <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-blue-800 font-bold text-4xl shadow">MM</div>
            <div>
                <h1 class="font-bold text-3xl tracking-tight">Medicina Muncii</h1>
                <p class="text-blue-200 text-sm">Atlantis</p>
            </div>
        </div>
        <nav class="space-y-2">
            <a href="#" class="flex items-center gap-4 px-6 py-4 bg-white/10 backdrop-blur rounded-2xl font-medium"><i class="fas fa-home"></i> Dashboard</a>
            <a href="cereri.html" class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-file-medical"></i> Cereri Noi</a>
            <a href="istoric.html" class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-history"></i> Istoric CNP</a>
            <a href="#" onclick="logout()" class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 rounded-2xl text-red-300"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="flex-1 ml-72 p-10">
        <h1 class="text-4xl font-bold mb-8 text-gray-800">Dashboard</h1>

        <div class="grid grid-cols-4 gap-6 mb-12" id="stats"></div>

        <div class="bg-white rounded-3xl shadow-xl p-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Ultimele cereri</h2>
            <table class="w-full">
                <thead>
                    <tr class="border-b text-gray-500">
                        <th class="text-left p-5">Nume</th>
                        <th class="text-left p-5">Firmă</th>
                        <th class="text-center p-5">Status</th>
                        <th class="text-center p-5">Data</th>
                        <th class="text-center p-5">Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="cereriBody" class="text-gray-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem("role") !== "admin") {
        alert("Acces interzis!");
        window.location.href = "login.html";
    }

    function logout() {
        if (confirm("Ești sigur că vrei să te deconectezi?")) {
            localStorage.removeItem("role");
            window.location.href = "login.html";
        }
    }

    function loadStats() {
        const cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        const total = cereri.length;
        const noi = cereri.filter(c => c.status === "Nou").length;
        const asteptare = cereri.filter(c => c.status === "Nou" || c.status === "În Așteptare").length;
        const emise = cereri.filter(c => c.status === "Emis").length;

        document.getElementById("stats").innerHTML = `
            <div class="bg-white rounded-3xl shadow p-8">
                <p class="text-gray-500">Cereri Noi</p>
                <p class="text-6xl font-bold text-blue-600 mt-4">${noi}</p>
            </div>
            <div class="bg-white rounded-3xl shadow p-8">
                <p class="text-gray-500">Avize Emise</p>
                <p class="text-6xl font-bold text-green-600 mt-4">${emise}</p>
            </div>
            <div class="bg-white rounded-3xl shadow p-8">
                <p class="text-gray-500">În Așteptare</p>
                <p class="text-6xl font-bold text-orange-500 mt-4">${asteptare}</p>
            </div>
            <div class="bg-white rounded-3xl shadow p-8">
                <p class="text-gray-500">Total</p>
                <p class="text-6xl font-bold mt-4">${total}</p>
            </div>
        `;
    }

    function loadCereri() {
        const tbody = document.getElementById("cereriBody");
        tbody.innerHTML = "";

        const cereri = JSON.parse(localStorage.getItem("cereri")) || [];

        if (cereri.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-500">Nu există cereri încă.</td></tr>`;
            return;
        }

        cereri.forEach(c => {
            const tr = document.createElement("tr");
            tr.className = "border-b hover:bg-gray-50";
            tr.innerHTML = `
                <td class="p-5 font-medium">${c.nume}</td>
                <td class="p-5">${c.firma}</td>
                <td class="text-center">
                    <span class="px-5 py-1 rounded-full text-sm ${c.status === 'Emis' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
                        ${c.status}
                    </span>
                </td>
                <td class="text-center text-sm">${c.data}</td>
                <td class="text-center">
                    ${c.status !== 'Emis' ? `<button onclick="emiteAviz(${c.id})" class="text-green-600 hover:text-green-800 mx-2 text-xl"><i class="fas fa-check"></i></button>` : ''}
                    <button onclick="viewCerere(${c.id})" class="text-blue-600 hover:text-blue-800 mx-2 text-xl"><i class="fas fa-eye"></i></button>
                    <button onclick="stergeCerere(${c.id})" class="text-red-600 hover:text-red-800 mx-2 text-xl"><i class="fas fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function emiteAviz(id) {
        if (!confirm("Confirmi emiterea avizului?")) return;
        let cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        const cerere = cereri.find(c => c.id === id);
        if (cerere) cerere.status = "Emis";
        localStorage.setItem("cereri", JSON.stringify(cereri));
        loadCereri();
        loadStats();
    }

    function viewCerere(id) {
        const cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        const cerere = cereri.find(c => c.id === id);
        if (!cerere) return alert("Cererea nu a fost găsită!");

        let html = `<div style="padding:40px; font-family:Arial; max-width:1000px; margin:auto; background:#f8fafc; border:2px solid #1e3a8a; border-radius:12px;">... (toate detaliile) ...</div>`;
        const win = window.open("", "_blank");
        win.document.write(html);
        win.document.close();
    }

    function stergeCerere(id) {
        if (!confirm("Ești sigur?")) return;
        let cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        cereri = cereri.filter(c => c.id !== id);
        localStorage.setItem("cereri", JSON.stringify(cereri));
        loadCereri();
        loadStats();
    }

    window.onload = () => {
        loadStats();
        loadCereri();
    };
</script>
</body>
</html>
