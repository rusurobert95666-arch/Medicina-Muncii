<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Medicina Muncii</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">
    <div class="w-64 bg-blue-700 text-white p-6 fixed h-full">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-blue-700 font-bold text-3xl">MM</div>
            <div>
                <h1 class="font-bold text-2xl">Medicina Muncii</h1>
                <p class="text-xs opacity-75">Atlantis</p>
            </div>
        </div>
        <nav class="space-y-2">
            <a href="#" class="flex items-center gap-3 px-5 py-4 bg-blue-600 rounded-2xl"><i class="fas fa-home"></i> Dashboard</a>
            <a href="cereri.html" class="flex items-center gap-3 px-5 py-4 hover:bg-blue-600 rounded-2xl"><i class="fas fa-file-medical"></i> Cereri Noi</a>
            <a href="istoric.html" class="flex items-center gap-3 px-5 py-4 hover:bg-blue-600 rounded-2xl"><i class="fas fa-history"></i> Istoric CNP</a>
        </nav>
    </div>

    <div class="flex-1 ml-64 p-8">
        <h1 class="text-4xl font-bold mb-8">Dashboard</h1>

        <!-- Statistici -->
        <div class="grid grid-cols-4 gap-6 mb-12" id="stats">
            <!-- Se umple din JS -->
        </div>

        <!-- Ultimele cereri -->
        <div class="bg-white rounded-3xl shadow p-8">
            <h2 class="text-2xl font-semibold mb-6">Ultimele cereri</h2>
            <table class="w-full">
                <thead>
                    <tr class="border-b text-gray-500">
                        <th class="text-left p-4">Nume</th>
                        <th class="text-left p-4">Firmă</th>
                        <th class="text-center p-4">Status</th>
                        <th class="text-center p-4">Data</th>
                        <th class="text-center p-4">Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="cereriBody" class="text-gray-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Protecție strictă - doar admin
    if (localStorage.getItem("role") !== "admin") {
        alert("Acces interzis! Doar administratorul poate vedea Dashboard-ul.");
        window.location.href = "login.html";
    }

    function loadStats() {
        const cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        
        const total = cereri.length;
        const noi = cereri.filter(c => c.status === "Nou").length;
        const asteptare = cereri.filter(c => c.status === "Nou" || c.status === "În Așteptare").length;
        const emise = cereri.filter(c => c.status === "Emis").length;

        document.getElementById("stats").innerHTML = `
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-gray-500">Cereri Noi</p>
                <p class="text-5xl font-bold mt-3">${noi}</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-gray-500">Avize Emise</p>
                <p class="text-5xl font-bold mt-3 text-green-600">${emise}</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-gray-500">În Așteptare</p>
                <p class="text-5xl font-bold mt-3 text-orange-500">${asteptare}</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-gray-500">Total</p>
                <p class="text-5xl font-bold mt-3">${total}</p>
            </div>
        `;
    }

    function loadCereri() {
        const tbody = document.getElementById("cereriBody");
        tbody.innerHTML = "";

        const cereri = JSON.parse(localStorage.getItem("cereri")) || [];

        if (cereri.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-500">Nu există cereri încă.</td></tr>`;
            return;
        }

        cereri.forEach(c => {
            const tr = document.createElement("tr");
            tr.className = "border-b hover:bg-gray-50";
            tr.innerHTML = `
                <td class="p-4">${c.nume}</td>
                <td class="p-4">${c.firma}</td>
                <td class="text-center"><span class="px-4 py-1 rounded-full text-sm ${c.status === 'Emis' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${c.status}</span></td>
                <td class="text-center text-sm">${c.data}</td>
                <td class="text-center">
                    ${c.status !== 'Emis' ? `<button onclick="emiteAviz(${c.id})" class="text-green-600 hover:text-green-800 mx-2"><i class="fas fa-check"></i></button>` : ''}
                    <button onclick="viewCerere(${c.id})" class="text-blue-600 hover:text-blue-800 mx-2"><i class="fas fa-eye"></i></button>
                    <button onclick="stergeCerere(${c.id})" class="text-red-600 hover:text-red-800 mx-2"><i class="fas fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function emiteAviz(id) {
        if (!confirm("Confirmi emiterea avizului?")) return;

        let cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        const cerere = cereri.find(c => c.id === id);
        if (cerere) cerere.status = "Emis";

        localStorage.setItem("cereri", JSON.stringify(cereri));

        loadCereri();
        loadStats();
        alert("Avizul a fost emis cu succes!");
    }

    function viewCerere(id) {
        const cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        const cerere = cereri.find(c => c.id === id);

        if (!cerere) {
            alert("Cererea nu a fost găsită!");
            return;
        }

        let html = `
            <div style="padding:40px; font-family:Arial; max-width:1000px; margin:auto; background:#f8fafc; border:2px solid #1e3a8a; border-radius:12px;">
                <h2 style="text-align:center; color:#1e3a8a;">Detalii Cerere Completă</h2>
                <hr style="margin:20px 0;">
                
                <p><strong>Nume & Prenume:</strong> ${cerere.nume}</p>
                <p><strong>Firmă:</strong> ${cerere.firma}</p>
                <p><strong>Locație:</strong> ${cerere.locatie || 'N/A'}</p>
                <p><strong>CNP:</strong> ${cerere.cnp || 'N/A'}</p>
                <p><strong>Data:</strong> ${cerere.data}</p>
                
                <hr style="margin:20px 0;">
                
                <h3>Stare de sănătate</h3>
                <p>I. Boli cronice: ${cerere.boli || 'Nu'} ${cerere.boliSpec ? '- ' + cerere.boliSpec : ''}</p>
                <p>II. Alergii: ${cerere.alergii || 'Nu'} ${cerere.alergiiSpec ? '- ' + cerere.alergiiSpec : ''}</p>
                <p>III. Tratament: ${cerere.tratament || 'Nu'} ${cerere.tratamentSpec ? '- ' + cerere.tratamentSpec : ''}</p>
                <p>IV. Intervenții: ${cerere.interventii || 'Nu'} ${cerere.interventiiSpec ? '- ' + cerere.interventiiSpec : ''}</p>
                
                <h3>Factori de risc</h3>
                <p>V. Fumați: ${cerere.fumat || 'Nu'}</p>
                <p>VI. Alcool: ${cerere.alcool || 'Nu'}</p>
                <p>VII. Echipă: ${cerere.echipa || 'Da'}</p>
                
                <h3>Simptome actuale</h3>
                <p>Dureri de cap frecvente: ${cerere.s1 || 'Nu'}</p>
                <p>Tulburări de vedere: ${cerere.s2 || 'Nu'}</p>
                <p>Dureri de spate / articulații: ${cerere.s3 || 'Nu'}</p>
                <p>Probleme respiratorii: ${cerere.s4 || 'Nu'}</p>
                <p>Probleme de auz: ${cerere.s5 || 'Nu'}</p>
                <p>Amețeli: ${cerere.s6 || 'Nu'}</p>
                
                <hr style="margin:20px 0;">
                <p><strong>Status:</strong> ${cerere.status}</p>
            </div>
        `;

        const win = window.open("", "_blank");
        win.document.write(html);
        win.document.close();
    }

    function stergeCerere(id) {
        if (!confirm("Ești sigur că vrei să ștergi această cerere?")) return;

        let cereri = JSON.parse(localStorage.getItem("cereri")) || [];
        cereri = cereri.filter(c => c.id !== id);
        localStorage.setItem("cereri", JSON.stringify(cereri));

        loadCereri();
        loadStats();
        alert("Cererea a fost ștearsă!");
    }

    window.onload = () => {
        loadCereri();
        loadStats();
    };
</script>
</body>
</html>
