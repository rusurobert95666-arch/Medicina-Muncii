<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>
<body>

<div class="flex min-h-screen">
    <div class="w-72 mm-sidebar text-white p-6 fixed h-full shadow-2xl">
        <div class="flex items-center gap-4 mb-14">
            <div class="w-14 h-14 mm-logo rounded-3xl flex items-center justify-center font-display font-bold text-3xl shadow">MM</div>
            <div>
                <h1 class="font-display font-bold text-2xl leading-tight">Medicina Muncii</h1>
                <p class="text-white/60 text-sm">Atlantis</p>
            </div>
        </div>
        <nav class="space-y-2">
            <a href="#" class="mm-nav-item active"><i class="fas fa-house w-5"></i> Dashboard</a>
            <a href="cereri.html" class="mm-nav-item"><i class="fas fa-file-medical w-5"></i> Cereri Noi</a>
            <a href="istoric.html" class="mm-nav-item"><i class="fas fa-clock-rotate-left w-5"></i> Istoric CNP</a>
            <a href="#" onclick="logout()" class="mm-nav-item logout"><i class="fas fa-arrow-right-from-bracket w-5"></i> Logout</a>
        </nav>
    </div>

    <div class="flex-1 ml-72 p-10">
        <h1 class="font-display text-4xl font-bold text-[var(--ink)]">Dashboard</h1>
        <div class="pulse-divider">
            <svg viewBox="0 0 150 30" width="100%" height="100%">
                <defs>
                    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#06B6A8"/>
                        <stop offset="100%" stop-color="#7C5CFF"/>
                    </linearGradient>
                </defs>
                <path class="pulse-line" d="M0 15 H42 L50 4 L58 26 L66 15 H150"/>
            </svg>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-6 mb-12" id="stats"></div>

        <div class="mm-panel p-8">
            <h2 class="font-display text-2xl font-bold mb-6 text-[var(--ink)]">Ultimele cereri</h2>
            <table class="w-full">
                <thead>
                    <tr class="border-b border-gray-100 text-gray-400 text-sm">
                        <th class="text-left p-5 font-semibold">Nume</th>
                        <th class="text-left p-5 font-semibold">Firmă</th>
                        <th class="text-center p-5 font-semibold">Status</th>
                        <th class="text-center p-5 font-semibold">Data</th>
                        <th class="text-center p-5 font-semibold">Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="cereriBody" class="text-gray-700"></tbody>
            </table>
        </div>
    </div>
</div>

        apiKey: "AIzaSyC2GWF1iu5U2W6kVU9u_4kgawScomCHQA",

        measurementId: "G-F99MNSDMEE"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    if (localStorage.getItem("role") !== "admin") {
        alert("Acces interzis!");
        window.location.href = "login.html";
    }

    function logout() {
        if (confirm("Ești sigur că vrei să te deconectezi?")) {
            localStorage.removeItem("role");
            window.location.href = "login.html";
        }
    }

    function loadStats() {
        db.collection("cereri").onSnapshot(snapshot => {
            const total = snapshot.size;
            let emise = 0;
            let asteptare = 0;
            let respinse = 0;

            snapshot.forEach(doc => {
                const status = doc.data().status;
                if (status === "Emis") emise++;
                else if (status === "Respins") respinse++;
                else asteptare++;
            });

            document.getElementById("stats").innerHTML = `
                <div class="stat-card stat-violet">
                    <p class="stat-label">Cereri Noi</p>
                    <p class="stat-value">${asteptare}</p>
                </div>
                <div class="stat-card stat-teal">
                    <p class="stat-label">Avize Emise</p>
                    <p class="stat-value">${emise}</p>
                </div>
                <div class="stat-card stat-amber">
                    <p class="stat-label">În Așteptare</p>
                    <p class="stat-value">${asteptare}</p>
                </div>
                <div class="stat-card stat-coral">
                    <p class="stat-label">Respinse</p>
                    <p class="stat-value">${respinse}</p>
                </div>
                <div class="stat-card stat-ink">
                    <p class="stat-label">Total</p>
                    <p class="stat-value">${total}</p>
                </div>
            `;
        });
    }

    function loadCereri() {
        const tbody = document.getElementById("cereriBody");
        tbody.innerHTML = "";

        db.collection("cereri").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const c = doc.data();
                const id = doc.id;
                const tr = document.createElement("tr");
                tr.className = "border-b border-gray-50 hover:bg-[#FAFBFF]";
                tr.innerHTML = `
                    <td class="p-5 font-semibold text-[var(--ink)]">${c.nume}</td>
                    <td class="p-5 text-gray-500">${c.firma}</td>
                    <td class="text-center">
                        <span class="badge ${c.status === 'Emis' ? 'badge-emis' : (c.status === 'Respins' ? 'badge-respins' : 'badge-nou')}">
                            ${c.status}
                        </span>
                    </td>
                    <td class="text-center text-sm text-gray-400">${c.data}</td>
                    <td class="text-center">
                        ${(c.status !== 'Emis' && c.status !== 'Respins') ? `<button onclick="emiteAviz('${id}')" class="icon-btn icon-teal" title="Emite aviz"><i class="fas fa-check"></i></button>` : ''}
                        ${(c.status !== 'Emis' && c.status !== 'Respins') ? `<button onclick="respingeCerere('${id}')" class="icon-btn icon-coral" title="Respinge cererea"><i class="fas fa-ban"></i></button>` : ''}
                        <button onclick="viewCerere('${id}')" class="icon-btn icon-violet" title="Vizualizează"><i class="fas fa-eye"></i></button>
                        <button onclick="stergeCerere('${id}')" class="icon-btn icon-ink" title="Șterge"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbznBnl2w4gikWSfCXH9qGORXMnJ6RVAVyHjeOVuexf9VBFcY8iAsUCzf7H64WxSpRBCiQ/exec";

    function emiteAviz(id) {
        if (!confirm("Confirmi emiterea avizului?")) return;

        db.collection("cereri").doc(id).get().then(doc => {
            const c = doc.data();
            db.collection("cereri").doc(id).update({ status: "Emis" });

            fetch(SHEET_WEBHOOK_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    nume: c.nume,
                    cnp: c.cnp,
                    firma: c.firma,
                    data: new Date().toISOString()
                })
            }).catch(err => console.error("Eroare la trimiterea către Google Sheet:", err));

            genereazaPDFAviz(c);
        });
    }

    function stripDiacritics(str) {
        return (str || '').toString()
            .replace(/ș/g, 's').replace(/Ș/g, 'S')
            .replace(/ț/g, 't').replace(/Ț/g, 'T')
            .replace(/ă/g, 'a').replace(/Ă/g, 'A')
            .replace(/â/g, 'a').replace(/Â/g, 'A')
            .replace(/î/g, 'i').replace(/Î/g, 'I');
    }

    function wrapPdfText(text, font, size, maxWidth) {
        const words = (text || '').split(' ');
        const lines = [];
        let line = '';
        words.forEach(word => {
            const test = line ? line + ' ' + word : word;
            if (font.widthOfTextAtSize(test, size) > maxWidth && line) {
                lines.push(line);
                line = word;
            } else {
                line = test;
            }
        });
        if (line) lines.push(line);
        return lines;
    }

    async function genereazaPDFAviz(c) {
        try {
            const azi = new Date();
            const expirare = new Date(azi);
            expirare.setMonth(expirare.getMonth() + 2);
            const formatData = (d) => d.toLocaleDateString('ro-RO');

            const { PDFDocument, StandardFonts, rgb } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            pdfDoc.registerFontkit(fontkit);

            let fontRegular, fontBold, T;
            try {
                const [regBytes, boldBytes] = await Promise.all([
                    fetch('https://cdn.jsdelivr.net/npm/roboto-fontface@0.10.0/fonts/roboto/Roboto-Regular.ttf').then(r => {
                        if (!r.ok) throw new Error('font fetch failed');
                        return r.arrayBuffer();
                    }),
                    fetch('https://cdn.jsdelivr.net/npm/roboto-fontface@0.10.0/fonts/roboto/Roboto-Bold.ttf').then(r => {
                        if (!r.ok) throw new Error('font fetch failed');
                        return r.arrayBuffer();
                    })
                ]);
                fontRegular = await pdfDoc.embedFont(regBytes, { subset: true });
                fontBold = await pdfDoc.embedFont(boldBytes, { subset: true });
                T = (s) => (s || '');
            } catch (fontErr) {
                console.warn('Font cu diacritice indisponibil, se folosește fontul standard (fără diacritice):', fontErr);
                fontRegular = await pdfDoc.embedFont(StandardFonts.Helvetica);
                fontBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                T = stripDiacritics;
            }

            const black = rgb(0, 0, 0);
            const pageWidth = 841.89, pageHeight = 595.28;
            const page = pdfDoc.addPage([pageWidth, pageHeight]);

            const pageTitle = T('Formular de Evaluare – Medicina Muncii');
            const pageTitleSize = 15;
            const pageTitleW = fontBold.widthOfTextAtSize(pageTitle, pageTitleSize);
            page.drawText(pageTitle, { x: (pageWidth - pageTitleW) / 2, y: pageHeight - 32, size: pageTitleSize, font: fontBold, color: black });

            const margin = 42;
            const colGap = 36;
            const colWidth = (pageWidth - margin * 2 - colGap) / 2;
            const col1X = margin;
            const col2X = margin + colWidth + colGap;

            const drawCenteredHeader = (text, x, width, y, size, skipLine) => {
                size = size || 12;
                const w = fontBold.widthOfTextAtSize(text, size);
                page.drawText(text, { x: x + (width - w) / 2, y, size, font: fontBold, color: black });
                if (!skipLine) {
                    page.drawLine({ start: { x, y: y - 5 }, end: { x: x + width, y: y - 5 }, thickness: 0.75, color: black });
                }
                return y - 24;
            };

            const drawFieldLine = (label, value, x, width, y) => {
                const size = 10.5;
                const labelText = T(label);
                page.drawText(labelText, { x, y, size, font: fontBold, color: black });
                const lineStartX = x + fontBold.widthOfTextAtSize(labelText, size) + 10;
                const lineEndX = x + width;
                page.drawLine({ start: { x: lineStartX, y: y - 2 }, end: { x: lineEndX, y: y - 2 }, thickness: 0.75, color: black });
                const val = T(value || '');
                if (val) {
                    const valW = fontRegular.widthOfTextAtSize(val, size);
                    page.drawText(val, { x: lineStartX + Math.max(0, (lineEndX - lineStartX - valW) / 2), y, size, font: fontRegular, color: black });
                }
                return y - 22;
            };

            const drawCheckbox = (x, y, checked) => {
                const size = 9;
                page.drawRectangle({ x, y, width: size, height: size, borderWidth: 0.75, borderColor: black });
                if (checked) {
                    page.drawText('X', { x: x + 1.2, y: y + 1, size: 8, font: fontBold, color: black });
                }
            };

            const drawYesNo = (label, x, y, isDa, specValue) => {
                const size = 10;
                const labelLines = wrapPdfText(T(label), fontBold, size, colWidth);
                labelLines.forEach(line => {
                    page.drawText(line, { x, y, size, font: fontBold, color: black });
                    y -= 13;
                });
                y -= 2;
                drawCheckbox(x, y - 6, !isDa);
                page.drawText('Nu', { x: x + 13, y: y - 5, size, font: fontRegular, color: black });
                y -= 14;
                drawCheckbox(x, y - 6, isDa);
                const daLabel = specValue !== undefined ? 'Da, specificați: ' : 'Da';
                page.drawText(T(daLabel), { x: x + 13, y: y - 5, size, font: fontRegular, color: black });
                if (specValue !== undefined) {
                    const labelW = fontRegular.widthOfTextAtSize(T(daLabel), size);
                    const lineStartX = x + 13 + labelW + 4;
                    const lineEndX = x + colWidth;
                    page.drawLine({ start: { x: lineStartX, y: y - 7 }, end: { x: lineEndX, y: y - 7 }, thickness: 0.75, color: black });
                    if (specValue) {
                        const val = T(specValue);
                        page.drawText(val, { x: lineStartX + 3, y: y - 5, size: 9, font: fontRegular, color: black });
                    }
                }
                return y - 18;
            };

            // ---------- LEFT COLUMN ----------
            let ly = pageHeight - 62;
            ly = drawCenteredHeader(T('Date personale'), col1X, colWidth, ly, 12, true);
            ly = drawFieldLine('Nume și prenume:', c.nume, col1X, colWidth, ly);

                const size = 10;

                labelLines.forEach(line => {
                    page.drawText(line, { x: col1X, y, size, font: fontBold, color: black });
                    y -= 13;
                });
                y -= 2;
                drawCheckbox(col1X, y - 6, !isDa);
                page.drawText('Nu', { x: col1X + 13, y: y - 5, size, font: fontRegular, color: black });
                y -= 14;
                drawCheckbox(col1X, y - 6, isDa);
                const daLabel = 'Da, specificați: ';
                page.drawText(T(daLabel), { x: col1X + 13, y: y - 5, size, font: fontRegular, color: black });
                const labelW = fontRegular.widthOfTextAtSize(T(daLabel), size);
                const lineStartX = col1X + 13 + labelW + 4;
                const lineEndX = col1X + colWidth;
                page.drawLine({ start: { x: lineStartX, y: y - 7 }, end: { x: lineEndX, y: y - 7 }, thickness: 0.75, color: black });
                if (spec) {
                    page.drawText(T(spec), { x: lineStartX + 3, y: y - 5, size: 9, font: fontRegular, color: black });

            ly = drawYesNoLeft('I. Suferiți de boli cronice?', ly, c.boli === 'Da', c.boliSpec || '');

                ['Probleme respiratorii', 's4'],
                ['Probleme de auz', 's5'],
                ['Amețeli', 's6']
            ];
            const daX = col2X + colWidth - 40;
            const nuX = col2X + colWidth - 14;
            const tSize = 10;
            page.drawText(T('Simptom'), { x: col2X, y: ry, size: tSize, font: fontBold, color: black });
            page.drawText('Da', { x: daX, y: ry, size: tSize, font: fontBold, color: black });
            page.drawText('Nu', { x: nuX, y: ry, size: tSize, font: fontBold, color: black });
            ry -= 6;
            page.drawLine({ start: { x: col2X, y: ry }, end: { x: col2X + colWidth, y: ry }, thickness: 0.75, color: black });
            ry -= 15;

            simptome.forEach(([label, key]) => {
                const val = c[key] || 'Nu';
                page.drawText(T(label), { x: col2X, y: ry, size: 10, font: fontRegular, color: black });
                drawCheckbox(daX, ry - 2, val === 'Da');
                drawCheckbox(nuX, ry - 2, val === 'Nu');
                ry -= 17;
            });

            ry -= 8;
            ry = drawCenteredHeader(T('Factori de risc'), col2X, colWidth, ry, 12);

            const drawSimpleYesNo = (label, y, isDa) => {
                const size = 10;
                page.drawText(T(label), { x: col2X, y, size, font: fontBold, color: black });
                y -= 14;
                drawCheckbox(col2X, y - 6, !isDa);
                page.drawText('Nu', { x: col2X + 13, y: y - 5, size, font: fontRegular, color: black });
                y -= 14;
                drawCheckbox(col2X, y - 6, isDa);
                page.drawText('Da', { x: col2X + 13, y: y - 5, size, font: fontRegular, color: black });
                return y - 18;
            };

            ry = drawSimpleYesNo('V. Fumați?', ry, c.fumat === 'Da');
            ry = drawSimpleYesNo('VI. Consumați alcool în mod regulat?', ry, c.alcool === 'Da');
            ry = drawSimpleYesNo('VII. Vă descurcați la lucrul în echipă?', ry, c.echipa === 'Da');

            // ---------- DECLARAȚIE ----------
            let dy = Math.min(ly, ry) - 16;
            const declTitle = T('Declarație');
            const declTitleSize = 12;
            const declTitleW = fontBold.widthOfTextAtSize(declTitle, declTitleSize);
            page.drawText(declTitle, { x: (pageWidth - declTitleW) / 2, y: dy, size: declTitleSize, font: fontBold, color: black });
            page.drawLine({ start: { x: pageWidth / 2 - declTitleW / 2 - 10, y: dy - 5 }, end: { x: pageWidth / 2 + declTitleW / 2 + 10, y: dy - 5 }, thickness: 0.75, color: black });
            dy -= 20;

            const declarationText = T('Prezentul document este eliberat de către Medical Department Atlantis de către medicul Mana Daniel, în urma evaluării medicale efectuate prin intermediul platformei online a Medical Department Atlantis, pe baza informațiilor și documentelor furnizate de solicitant, la data de ' + formatData(azi) + '. Documentul este valabil pentru o perioadă de 2 (două) luni de la data emiterii, respectiv până la data de ' + formatData(expirare) + '.');

            const declSize = 10;
            const declLines = wrapPdfText(declarationText, fontBold, declSize, pageWidth - margin * 2);
            declLines.forEach(line => {
                page.drawText(line, { x: margin, y: dy, size: declSize, font: fontBold, color: black });
                dy -= 14;
            });

            // ---------- STAMP + SIGNATURE ----------
            dy -= 18;
            const stampBytes = Uint8Array.from(atob(STAMP_B64), ch => ch.charCodeAt(0));
            const sigBytes = Uint8Array.from(atob(SIG_B64), ch => ch.charCodeAt(0));
            const stampImg = await pdfDoc.embedPng(stampBytes);
            const sigImg = await pdfDoc.embedPng(sigBytes);

            const stampW = 88, stampH = stampImg.height * (stampW / stampImg.width);
            const sigW = 105, sigH = sigImg.height * (sigW / sigImg.width);

            const stampLabelX = pageWidth * 0.27;
            const sigLabelX = pageWidth * 0.68;

            const lbl1 = T('Ștampila oficială');
            const lbl1Size = 11;
            const lbl1W = fontBold.widthOfTextAtSize(lbl1, lbl1Size);
            page.drawText(lbl1, { x: stampLabelX - lbl1W / 2, y: dy, size: lbl1Size, font: fontBold, color: black });
            page.drawLine({ start: { x: stampLabelX - lbl1W / 2 - 8, y: dy - 4 }, end: { x: stampLabelX + lbl1W / 2 + 8, y: dy - 4 }, thickness: 0.75, color: black });

            const lbl2 = T('Director General');
            const lbl2Size = 11;
            const lbl2W = fontBold.widthOfTextAtSize(lbl2, lbl2Size);
            page.drawText(lbl2, { x: sigLabelX - lbl2W / 2, y: dy, size: lbl2Size, font: fontBold, color: black });
            page.drawLine({ start: { x: sigLabelX - lbl2W / 2 - 8, y: dy - 4 }, end: { x: sigLabelX + lbl2W / 2 + 8, y: dy - 4 }, thickness: 0.75, color: black });

            page.drawImage(stampImg, { x: stampLabelX - stampW / 2, y: dy - stampH - 8, width: stampW, height: stampH });
            page.drawImage(sigImg, { x: sigLabelX - sigW / 2, y: dy - sigH - 4, width: sigW, height: sigH });

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Aviz_${(c.nume || 'necunoscut').replace(/\s+/g, '_')}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) {
            console.error("Eroare la generarea PDF-ului:", err);
            alert("Avizul a fost emis, dar generarea PDF-ului a eșuat. Verifică Console (F12) pentru detalii.");
        }
    }

    function respingeCerere(id) {
        if (!confirm("Confirmi respingerea acestei cereri?\n\nUtilizatorul va putea depune imediat o cerere nouă cu același CNP (respingerea nu blochează 2 luni).")) return;
        db.collection("cereri").doc(id).update({ status: "Respins" });
    }

    function stergeCerere(id) {
        if (!confirm("Ești sigur că vrei să ștergi această cerere?")) return;
        db.collection("cereri").doc(id).delete();
    }

    function viewCerere(id) {
        db.collection("cereri").doc(id).get().then(doc => {
            if (doc.exists) {
                const c = doc.data();
                let html = `
                    <div style="padding:40px; font-family:'Plus Jakarta Sans',Arial,sans-serif; max-width:1000px; margin:auto; background:#F5F7FB; border-radius:24px;">
                        <h2 style="text-align:center; color:#14213D; font-family:'Space Grotesk',sans-serif;">Detalii Cerere Completă</h2>
                        <hr style="margin:20px 0; border:none; border-top:2px solid #E5E9F2;">
                        <p><strong>Nume & Prenume:</strong> ${c.nume}</p>
                        <p><strong>Firmă:</strong> ${c.firma}</p>
                        <p><strong>Locație:</strong> ${c.locatie || 'N/A'}</p>
                        <p><strong>CNP:</strong> ${c.cnp || 'N/A'}</p>
                        <p><strong>Data:</strong> ${c.data}</p>
                        <hr style="margin:20px 0; border:none; border-top:2px solid #E5E9F2;">
                        <h3 style="color:#059488;">Stare de sănătate</h3>
                        <p>I. Boli cronice: ${c.boli || 'Nu'} ${c.boliSpec ? '- ' + c.boliSpec : ''}</p>
                        <p>II. Alergii: ${c.alergii || 'Nu'} ${c.alergiiSpec ? '- ' + c.alergiiSpec : ''}</p>
                        <p>III. Tratament: ${c.tratament || 'Nu'} ${c.tratamentSpec ? '- ' + c.tratamentSpec : ''}</p>
                        <p>IV. Intervenții: ${c.interventii || 'Nu'} ${c.interventiiSpec ? '- ' + c.interventiiSpec : ''}</p>
                        <h3 style="color:#059488;">Factori de risc</h3>
                        <p>V. Fumați: ${c.fumat || 'Nu'}</p>
                        <p>VI. Alcool: ${c.alcool || 'Nu'}</p>
                        <p>VII. Echipă: ${c.echipa || 'Da'}</p>
                        <h3 style="color:#059488;">Simptome actuale</h3>
                        <p>Dureri de cap frecvente: ${c.s1 || 'Nu'}</p>
                        <p>Tulburări de vedere: ${c.s2 || 'Nu'}</p>
                        <p>Dureri de spate / articulații: ${c.s3 || 'Nu'}</p>
                        <p>Probleme respiratorii: ${c.s4 || 'Nu'}</p>
                        <p>Probleme de auz: ${c.s5 || 'Nu'}</p>
                        <p>Amețeli: ${c.s6 || 'Nu'}</p>
                        <hr style="margin:20px 0; border:none; border-top:2px solid #E5E9F2;">
                        <p><strong>Status:</strong> ${c.status}</p>
                    </div>
                `;
                const win = window.open("", "_blank");
                win.document.write(html);
                win.document.close();
            }
        });
    }

    window.onload = () => {
        loadStats();
        loadCereri();
    };
</script>
</body>
</html>
