<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Medicina Muncii</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

<div class="flex min-h-screen">
    <div class="w-72 bg-gradient-to-b from-blue-800 to-blue-900 text-white p-6 fixed h-full shadow-2xl">
        <div class="flex items-center gap-4 mb-16">
            <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-blue-800 font-bold text-4xl shadow">MM</div>
            <div>
                <h1 class="font-bold text-3xl tracking-tight">Medicina Muncii</h1>
                <p class="text-blue-200 text-sm">Atlantis</p>
            </div>
        </div>
        <nav class="space-y-2">
            <a href="#" class="flex items-center gap-4 px-6 py-4 bg-white/10 backdrop-blur rounded-2xl font-medium"><i class="fas fa-home"></i> Dashboard</a>
            <a href="cereri.html" class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-file-medical"></i> Cereri Noi</a>
            <a href="istoric.html" class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-history"></i> Istoric CNP</a>
            <a href="#" onclick="logout()" class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 rounded-2xl text-red-300"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="flex-1 ml-72 p-10">
        <h1 class="text-4xl font-bold mb-8 text-gray-800">Dashboard</h1>

        <div class="grid grid-cols-4 gap-6 mb-12" id="stats"></div>

        <div class="bg-white rounded-3xl shadow-xl p-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Ultimele cereri</h2>
            <table class="w-full">
                <thead>
                    <tr class="border-b text-gray-500">
                        <th class="text-left p-5">Nume</th>
                        <th class="text-left p-5">Firmă</th>
                        <th class="text-center p-5">Status</th>
                        <th class="text-center p-5">Data</th>
                        <th class="text-center p-5">Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="cereriBody" class="text-gray-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC2GWF1iu5U2W6kVU9u_4kgawScomCHQA",
        authDomain: "medicina-muncii-27010.firebaseapp.com",
        projectId: "medicina-muncii-27010",
        storageBucket: "medicina-muncii-27010.firebasestorage.app",
        messagingSenderId: "318304709818",
        appId: "1:318304709818:web:c6ae716b7a2f97545eedb8",
        measurementId: "G-F99MNSDMEE"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    if (localStorage.getItem("role") !== "admin") {
        alert("Acces interzis!");
        window.location.href = "login.html";
    }

    function logout() {
        if (confirm("Ești sigur că vrei să te deconectezi?")) {
            localStorage.removeItem("role");
            window.location.href = "login.html";
        }
    }

    function loadStats() {
        db.collection("cereri").get().then(snapshot => {
            const total = snapshot.size;
            let emise = 0;
            let asteptare = 0;

            snapshot.forEach(doc => {
                const status = doc.data().status;
                if (status === "Emis") emise++;
                else asteptare++;
            });

            document.getElementById("stats").innerHTML = `
                <div class="bg-white p-8 rounded-3xl shadow">
                    <p class="text-gray-500">Cereri Noi</p>
                    <p class="text-6xl font-bold text-blue-600 mt-4">${asteptare}</p>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow">
                    <p class="text-gray-500">Avize Emise</p>
                    <p class="text-6xl font-bold text-green-600 mt-4">${emise}</p>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow">
                    <p class="text-gray-500">În Așteptare</p>
                    <p class="text-6xl font-bold text-orange-500 mt-4">${asteptare}</p>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow">
                    <p class="text-gray-500">Total</p>
                    <p class="text-6xl font-bold mt-4">${total}</p>
                </div>
            `;
        });
    }

    function loadCereri() {
        const tbody = document.getElementById("cereriBody");
        tbody.innerHTML = "";

        db.collection("cereri").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const c = doc.data();
                const id = doc.id;
                const tr = document.createElement("tr");
                tr.className = "border-b hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="p-5 font-medium">${c.nume}</td>
                    <td class="p-5">${c.firma}</td>
                    <td class="text-center">
                        <span class="px-4 py-1 rounded-full text-sm ${c.status === 'Emis' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
                            ${c.status}
                        </span>
                    </td>
                    <td class="text-center text-sm">${c.data}</td>
                    <td class="text-center">
                        ${c.status !== 'Emis' ? `<button onclick="emiteAviz('${id}')" class="text-green-600 hover:text-green-800 mx-2"><i class="fas fa-check"></i></button>` : ''}
                        <button onclick="viewCerere('${id}')" class="text-blue-600 hover:text-blue-800 mx-2"><i class="fas fa-eye"></i></button>
                        <button onclick="stergeCerere('${id}')" class="text-red-600 hover:text-red-800 mx-2"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    function emiteAviz(id) {
        if (!confirm("Confirmi emiterea avizului?")) return;
        db.collection("cereri").doc(id).update({ status: "Emis" });
    }

    function stergeCerere(id) {
        if (!confirm("Ești sigur că vrei să ștergi această cerere?")) return;
        db.collection("cereri").doc(id).delete();
    }

    function viewCerere(id) {
        db.collection("cereri").doc(id).get().then(doc => {
            if (doc.exists) {
                const c = doc.data();
                let html = `
                    <div style="padding:40px; font-family:Arial; max-width:1000px; margin:auto; background:#f8fafc; border:2px solid #1e3a8a; border-radius:12px;">
                        <h2 style="text-align:center; color:#1e3a8a;">Detalii Cerere Completă</h2>
                        <hr style="margin:20px 0;">
                        <p><strong>Nume & Prenume:</strong> ${c.nume}</p>
                        <p><strong>Firmă:</strong> ${c.firma}</p>
                        <p><strong>Locație:</strong> ${c.locatie || 'N/A'}</p>
                        <p><strong>CNP:</strong> ${c.cnp || 'N/A'}</p>
                        <p><strong>Data:</strong> ${c.data}</p>
                        <hr style="margin:20px 0;">
                        <h3>Stare de sănătate</h3>
                        <p>I. Boli cronice: ${c.boli || 'Nu'} ${c.boliSpec ? '- ' + c.boliSpec : ''}</p>
                        <p>II. Alergii: ${c.alergii || 'Nu'} ${c.alergiiSpec ? '- ' + c.alergiiSpec : ''}</p>
                        <p>III. Tratament: ${c.tratament || 'Nu'} ${c.tratamentSpec ? '- ' + c.tratamentSpec : ''}</p>
                        <p>IV. Intervenții: ${c.interventii || 'Nu'} ${c.interventiiSpec ? '- ' + c.interventiiSpec : ''}</p>
                        <h3>Factori de risc</h3>
                        <p>V. Fumați: ${c.fumat || 'Nu'}</p>
                        <p>VI. Alcool: ${c.alcool || 'Nu'}</p>
                        <p>VII. Echipă: ${c.echipa || 'Da'}</p>
                        <h3>Simptome actuale</h3>
                        <p>Dureri de cap frecvente: ${c.s1 || 'Nu'}</p>
                        <p>Tulburări de vedere: ${c.s2 || 'Nu'}</p>
                        <p>Dureri de spate / articulații: ${c.s3 || 'Nu'}</p>
                        <p>Probleme respiratorii: ${c.s4 || 'Nu'}</p>
                        <p>Probleme de auz: ${c.s5 || 'Nu'}</p>
                        <p>Amețeli: ${c.s6 || 'Nu'}</p>
                        <hr style="margin:20px 0;">
                        <p><strong>Status:</strong> ${c.status}</p>
                    </div>
                `;
                const win = window.open("", "_blank");
                win.document.write(html);
                win.document.close();
            }
        });
    }

    window.onload = () => {
        loadStats();
        loadCereri();
    };
</script>
</body>
</html>
