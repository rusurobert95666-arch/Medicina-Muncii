<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric CNP - Medicina Muncii</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">
    <div class="w-64 bg-blue-700 text-white p-5 fixed h-full">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-blue-700 font-bold text-2xl">MM</div>
            <div>
                <h1 class="font-bold text-xl">Medicina Muncii</h1>
                <p class="text-xs opacity-75">Atlantis</p>
            </div>
        </div>
        <nav class="space-y-2">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-blue-600"><i class="fas fa-home"></i> Dashboard</a>
            <a href="cereri.html" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-600 rounded-xl"><i class="fas fa-file-medical"></i> Cereri Noi</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-xl"><i class="fas fa-history"></i> Istoric CNP</a>
        </nav>
    </div>

    <div class="flex-1 ml-64 p-10">
        <h1 class="text-4xl font-bold mb-8">Istoric CNP</h1>

        <div class="bg-white rounded-3xl shadow-xl p-8">
            <div id="istoricCNP" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC2GWF1iu5U2W6kVU9u_4kgawScomCHQA",
        authDomain: "medicina-muncii-27010.firebaseapp.com",
        projectId: "medicina-muncii-27010",
        storageBucket: "medicina-muncii-27010.firebasestorage.app",
        messagingSenderId: "318304709818",
        appId: "1:318304709818:web:c6ae716b7a2f97545eedb8",
        measurementId: "G-F99MNSDMEE"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    if (localStorage.getItem("role") !== "admin") {
        alert("Acces interzis! Doar administratorul poate vedea istoricul.");
        window.location.href = "login.html";
    }

    function loadIstoricCNP() {
        const container = document.getElementById("istoricCNP");
        container.innerHTML = "";

        db.collection("cereri").get().then(snapshot => {
            const grouped = {};
            snapshot.forEach(doc => {
                const c = doc.data();
                if (!grouped[c.cnp]) grouped[c.cnp] = [];
                grouped[c.cnp].push(c);
            });

            Object.keys(grouped).forEach(cnp => {
                const list = grouped[cnp];
                const ultima = list[0];

                const div = document.createElement("div");
                div.className = "bg-white border rounded-2xl p-5 hover:shadow";
                div.innerHTML = `
                    <p class="font-medium">${cnp}</p>
                    <p class="text-sm text-gray-600">${ultima.nume}</p>
                    <p class="text-xs text-gray-400">${list.length} cerere${list.length > 1 ? 'ri' : ''} • Ultima: ${ultima.data}</p>
                `;
                container.appendChild(div);
            });
        });
    }

    window.onload = loadIstoricCNP;
</script>
</body>
</html>
