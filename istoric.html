<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric CNP - Medicina Muncii</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>

<div class="flex min-h-screen">
    <div class="w-72 mm-sidebar text-white p-6 fixed h-full shadow-2xl">
        <div class="flex items-center gap-4 mb-14">
            <div class="w-14 h-14 mm-logo rounded-3xl flex items-center justify-center font-display font-bold text-3xl shadow">MM</div>
            <div>
                <h1 class="font-display font-bold text-2xl leading-tight">Medicina Muncii</h1>
                <p class="text-white/60 text-sm">Atlantis</p>
            </div>
        </div>
        <nav class="space-y-2">
            <a href="index.html" class="mm-nav-item"><i class="fas fa-house w-5"></i> Dashboard</a>
            <a href="cereri.html" class="mm-nav-item"><i class="fas fa-file-medical w-5"></i> Cereri Noi</a>
            <a href="#" class="mm-nav-item active"><i class="fas fa-clock-rotate-left w-5"></i> Istoric CNP</a>
        </nav>
    </div>

    <div class="flex-1 ml-72 p-10">
        <h1 class="font-display text-4xl font-bold text-[var(--ink)]">Istoric CNP</h1>
        <div class="pulse-divider">
            <svg viewBox="0 0 150 30" width="100%" height="100%">
                <defs>
                    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#06B6A8"/>
                        <stop offset="100%" stop-color="#7C5CFF"/>
                    </linearGradient>
                </defs>
                <path class="pulse-line" d="M0 15 H42 L50 4 L58 26 L66 15 H150"/>
            </svg>
        </div>

        <div class="mm-panel p-8">
            <div id="istoricCNP" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC2GWF1iu5U2W6kVU9u_4kgawScomCHQA",
        authDomain: "medicina-muncii-27010.firebaseapp.com",
        projectId: "medicina-muncii-27010",
        storageBucket: "medicina-muncii-27010.firebasestorage.app",
        messagingSenderId: "318304709818",
        appId: "1:318304709818:web:c6ae716b7a2f97545eedb8",
        measurementId: "G-F99MNSDMEE"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    if (localStorage.getItem("role") !== "admin") {
        alert("Acces interzis! Doar administratorul poate vedea istoricul.");
        window.location.href = "login.html";
    }

    function loadIstoricCNP() {
        const container = document.getElementById("istoricCNP");
        container.innerHTML = "";

        db.collection("cereri").get().then(snapshot => {
            const grouped = {};
            snapshot.forEach(doc => {
                const c = doc.data();
                if (!grouped[c.cnp]) grouped[c.cnp] = [];
                grouped[c.cnp].push(c);
            });

            Object.keys(grouped).forEach(cnp => {
                const list = grouped[cnp];
                const ultima = list[0];

                let accentColor = "#7C5CFF";
                if (ultima.status === "Emis") accentColor = "#06B6A8";
                else if (ultima.status === "Respins") accentColor = "#FF5D73";
                else accentColor = "#FFB627";

                const div = document.createElement("div");
                div.className = "hist-card p-5";
                div.style.borderLeftColor = accentColor;
                div.innerHTML = `
                    <p class="font-display font-bold text-lg text-[var(--ink)]">${cnp}</p>
                    <p class="text-sm text-gray-500 mt-1">${ultima.nume}</p>
                    <p class="text-xs text-gray-400 mt-3">${list.length} cerere${list.length > 1 ? 'ri' : ''} • Ultima: ${ultima.data}</p>
                `;
                container.appendChild(div);
            });
        });
    }

    window.onload = loadIstoricCNP;
</script>
</body>
</html>
