<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medicina Muncii</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-96">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-900">Login</h1>

        <div class="space-y-6">
            <input type="text" id="username" placeholder="Username" class="w-full border rounded-2xl px-5 py-4">
            <input type="password" id="password" placeholder="Parolă" class="w-full border rounded-2xl px-5 py-4">

            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-lg font-semibold">
                Intră în sistem
            </button>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (username === "admin" && password === "Smurd2026..") {
                localStorage.setItem("role", "admin");
                window.location.href = "index.html";
            } else if (username === "user" && password === "123") {
                localStorage.setItem("role", "user");
                window.location.href = "cereri.html";
            } else {
                alert("Username sau parolă greșită!");
            }
        }
    </script>
</body>
</html>
